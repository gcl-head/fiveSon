<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五子棋 AI 训练平台</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero panel reveal">
        <h1>五子棋 AI</h1>
        <p>持续自我进化的五子棋训练平台</p>
        <p class="hero-note" id="policySource">对战策略: 等待恢复训练模型</p>
        <div class="status-row">
          <span id="status-pill" class="pill">启动中</span>
          <span id="device-pill" class="pill alt">设备: 检测中</span>
        </div>
      </section>

      <section class="panel reveal delay-1">
        <h2>实时训练指标</h2>
        <div class="grid two">
          <div class="card"><label>当前模型</label><strong id="current_model">bootstrap</strong></div>
          <div class="card"><label>最佳模型</label><strong id="best_model">bootstrap</strong></div>
          <div class="card"><label>回放缓冲区大小</label><strong id="replay_size">0</strong></div>
          <div class="card"><label>训练步数</label><strong id="training_step">0</strong></div>
          <div class="card"><label>最新损失值</label><strong id="latest_loss">0.0000</strong></div>
          <div class="card"><label>ELO 评分</label><strong id="latest_elo">0.0</strong></div>
        </div>
      </section>

      <section class="panel reveal delay-2">
        <h2>运行性能</h2>
        <div class="grid two">
          <div class="card"><label>训练速率（步/秒）</label><strong id="train_steps_per_sec">0.0</strong></div>
          <div class="card"><label>自弈速率（局/分钟）</label><strong id="games_per_min">0.0</strong></div>
          <div class="card"><label>并行训练棋局数</label><strong id="parallel_self_play_games">0</strong></div>
          <div class="card"><label>启发式落子总数</label><strong id="heuristic_policy_moves">0</strong></div>
          <div class="card"><label>模型落子总数</label><strong id="model_policy_moves">0</strong></div>
          <div class="card"><label>模型落子占比</label><strong id="model_policy_ratio">0.0%</strong></div>
          <div class="card"><label>启发式落子占比</label><strong id="heuristic_policy_ratio">0.0%</strong></div>
          <div class="card"><label>启发式 bootstrap 局数</label><strong id="heuristic_bootstrap_games">0</strong></div>
          <div class="card"><label>平均每局步数</label><strong id="avg_game_moves">0</strong></div>
          <div class="card"><label>平均每局耗时</label><strong id="avg_game_ms">0 ms</strong></div>
          <div class="card"><label>每轮训练步数</label><strong id="steps_per_cycle">0</strong></div>
          <div class="card"><label>批量大小</label><strong id="batch_size">0</strong></div>
        </div>
      </section>

      <section class="panel reveal delay-3">
        <h2>训练棋局直播</h2>
        <p class="hero-note">以下棋盘为当前并行训练中的实时快照（每秒更新）。</p>
        <div id="selfPlayGrid" class="selfplay-grid"></div>
      </section>

      <section class="panel reveal delay-4">
        <h2>训练控制</h2>
        <div class="actions">
          <button id="pauseBtn">暂停训练</button>
          <button id="resumeBtn">继续训练</button>
          <button id="refreshBtn" class="ghost">刷新状态</button>
        </div>
        <div class="actions" style="margin-top: 10px;">
          <span class="eval-result">并行自弈热切换:</span>
          <button class="ghost parallel-btn" data-parallel="1">1</button>
          <button class="ghost parallel-btn" data-parallel="4">4</button>
          <button class="ghost parallel-btn" data-parallel="8">8</button>
          <button class="ghost parallel-btn" data-parallel="16">16</button>
          <button class="ghost parallel-btn" data-parallel="32">32</button>
          <span id="parallelSwitchResult" class="eval-result"></span>
        </div>
        <div class="actions" style="margin-top: 10px;">
          <label class="inline-field">
            评测代次
            <input id="quickEvalGeneration" type="number" min="0" step="1" value="0" />
          </label>
          <label class="inline-field">
            基线代次
            <input id="quickEvalBaseline" type="number" min="0" step="1" value="0" />
          </label>
          <button id="quickEvalBtn" class="ghost">快速验证（32局）</button>
          <span id="quickEvalResult" class="eval-result">点击后将评测选定代次</span>
        </div>
        <div id="quickEvalGrid" class="selfplay-grid" style="margin-top: 12px;"></div>
      </section>

      <section class="panel reveal delay-5">
        <h2>人机对战</h2>
        <p id="gameMessage" class="game-message">你执黑棋，点击棋盘落子。</p>
        <div id="gameIngest" class="ingest-banner" style="display:none"></div>
        <div class="actions">
          <button id="newGameBtn" class="ghost">开始新对局</button>
        </div>
        <div id="board" class="board"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
